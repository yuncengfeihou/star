<div class="favorites_settings">
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
      <b>收藏插件</b>
      <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
      <div class="favorites_directory">
        <div class="favorites_header">
          <div class="favorites_title">所有收藏</div>
          <div class="favorites_actions">
            <div id="favorites_clear_all" class="menu_button">清空所有收藏</div>
          </div>
        </div>
        <div class="favorites_divider"></div>
        <div id="favorites_directory_content" class="favorites_directory_content">
          <!-- 收藏目录将在JavaScript中动态生成 -->
          <div class="no_favorites">暂无收藏内容</div>
        </div>
        <div id="favorites_directory_pagination" class="favorites_pagination">
          <!-- 分页控件将在JavaScript中动态生成 -->
        </div>
      </div>
    </div>
  </div>
</div>
